<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civizsicloud | Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            'dark-bg': '#0f172a',
            'dark-card': 'rgba(15, 23, 42, 0.5)',
            'dark-border': '#1e293b',
            primary: '#06b6d4',
            'primary-hover': '#0891b2',
            'primary-light': '#22d3ee',
            'primary-dark': '#164e63',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .hidden-pane { display: none !important; }
    .active-pane { display: block !important; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background-color: #06b6d4; color: #0f172a; }
  </style>
</head>
<body class="text-slate-200 font-sans antialiased flex flex-col min-h-screen selection:bg-primary/30 selection:text-white">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 border-b border-dark-border bg-dark-bg/80 backdrop-blur-md">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">
        <div class="flex-shrink-0">
          <a href="index.html" class="text-xl font-bold tracking-tight text-white flex items-center gap-2 underline underline-offset-4 decoration-primary">
            <div class="w-8 h-8 bg-primary rounded-md flex items-center justify-center font-bold text-slate-900">C</div>
            <span>Civizsicloud</span>
          </a>
        </div>
        
        <div class="hidden md:block">
          <div class="ml-10 flex items-center space-x-8">
            <a href="index.html" class="text-slate-300 hover:text-white hover:border-b-2 hover:border-dark-border border-b-2 border-transparent px-1 py-2 text-sm font-medium transition-colors">Home</a>
            <a href="about.html" class="text-slate-300 hover:text-white hover:border-b-2 hover:border-dark-border border-b-2 border-transparent px-1 py-2 text-sm font-medium transition-colors">About Us</a>
            <a href="services.html" class="text-white border-b-2 border-primary px-1 py-2 text-sm font-medium transition-colors">Services</a>
            <a href="contact.html" class="text-slate-300 hover:text-white hover:border-b-2 hover:border-dark-border border-b-2 border-transparent px-1 py-2 text-sm font-medium transition-colors">Contact</a>
          </div>
        </div>
        
        <div class="hidden md:flex items-center">
          <a href="contact.html" class="bg-primary-hover hover:bg-primary text-slate-900 text-xs font-bold px-4 py-2 rounded uppercase tracking-widest transition-colors flex items-center">
            Deploy Now <i data-lucide="chevron-right" class="ml-1 h-4 w-4"></i>
          </a>
        </div>
        
        <div class="md:hidden flex items-center">
          <button id="mobileMenuBtn" class="text-slate-300 hover:text-white p-2">
            <i data-lucide="menu" class="h-6 w-6"></i>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden border-t border-dark-border bg-dark-bg/95 backdrop-blur-md">
      <div class="space-y-1 px-4 pb-4 pt-2">
        <a href="index.html" class="text-slate-300 hover:bg-dark-border hover:text-white block rounded-md px-3 py-2 text-base font-medium">Home</a>
        <a href="about.html" class="text-slate-300 hover:bg-dark-border hover:text-white block rounded-md px-3 py-2 text-base font-medium">About Us</a>
        <a href="services.html" class="bg-primary/10 text-primary block rounded-md px-3 py-2 text-base font-medium">Services</a>
        <a href="contact.html" class="text-slate-300 hover:bg-dark-border hover:text-white block rounded-md px-3 py-2 text-base font-medium">Contact</a>
      </div>
    </div>
  </nav>

  <main class="flex-1 w-full px-4 py-8 sm:px-10 lg:px-10 max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-8 border-b border-dark-border pb-6">
      <div class="max-w-xl">
        <div class="flex items-center gap-3 mb-4">
          <span class="px-2 py-0.5 bg-dark-border border border-dark-border text-[10px] text-primary-light font-mono uppercase tracking-tighter">Pricing & Services</span>
        </div>
        <h1 class="text-4xl md:text-5xl font-light tracking-tight mb-4">Select your power.</h1>
        <p class="text-lg text-slate-400">
          Scale your infrastructure with our instances and packages. <strong class="text-primary font-bold">Currently enjoying a 30% Discount!</strong>
        </p>
      </div>

      <!-- Currency Selector -->
      <div class="flex flex-col items-start gap-2">
        <label for="currencySelector" class="text-xs font-mono text-slate-500 uppercase tracking-widest">Select Currency</label>
        <div class="relative">
          <select id="currencySelector" onchange="renderAll()" class="appearance-none bg-dark-card border border-dark-border text-white text-sm rounded px-4 py-2 pr-8 focus:outline-none focus:border-primary-light transition-colors">
            <option value="INR" selected>₹ INR (Indian Rupee)</option>
            <option value="USD">$ USD (US Dollar)</option>
            <option value="EUR">€ EUR (Euro)</option>
            <option value="GBP">£ GBP (British Pound)</option>
            <option value="BDT">৳ BDT (Bangladeshi Taka)</option>
            <option value="PKR">Rs PKR (Pakistani Rupee)</option>
          </select>
          <i data-lucide="chevron-down" class="absolute right-2 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 pointer-events-none"></i>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex flex-wrap items-center gap-2 mb-10 border border-dark-border p-2 rounded-lg bg-dark-card/50" id="tabs-container"></div>

    <!-- Active Panes -->
    <div id="panes-container"></div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-dark-border py-8 px-4 sm:px-6 lg:px-8 text-center flex flex-col items-center justify-center gap-4">
    <a href="index.html" class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
      <div class="w-6 h-6 bg-primary rounded bg-opacity-20 border border-primary/50 flex items-center justify-center text-xs text-primary">C</div>
      <span class="text-slate-300">Civizsicloud</span>
    </a>
    <div class="flex items-center gap-6 text-sm text-slate-500">
      <a href="https://discord.gg/NrFzwAdPct" target="_blank" class="hover:text-primary-light transition-colors">Discord</a>
      <a href="https://github.com/civizsicloud" target="_blank" class="hover:text-primary-light transition-colors">GitHub</a>
    </div>
    <p class="text-slate-400 font-bold text-sm mt-4">
      &copy; <script>document.write(new Date().getFullYear())</script> Developed by SDGAMER. All rights reserved.
    </p>
  </footer>

  <!-- Scripts -->
  <script>
    lucide.createIcons();
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
      const menu = document.getElementById('mobileMenu');
      menu.classList.toggle('hidden');
    });

    const rates = { INR: 1, USD: 1/83, EUR: 1/90, GBP: 1/105, BDT: 1.3, PKR: 3.3 };
    const symbols = { INR: '₹', USD: '$', EUR: '€', GBP: '£', BDT: '৳', PKR: 'Rs ' };

    const data = [
      {
        id: 'minecraft', icon: 'server', title: 'Minecraft Server',
        heading: 'PREMIUM MINECRAFT PLANS', desc: 'High-frequency cores. NVMe speed. Built for serious performance.',
        items: [
          { name: 'Premium Plan', price: 210, features: ['4 vCore (AMD Epyc)', '8GB DDR5 RAM', '60GB NVMe SSD'] },
          { name: 'Business Plan', price: 270, features: ['6 vCore (AMD Epyc)', '12GB DDR5 RAM', '80GB NVMe SSD'] },
          { name: 'Enterprise Plan', price: 310, features: ['8 vCore (AMD Epyc)', '16GB DDR5 RAM', '100GB NVMe SSD'] },
          { name: 'Ultra Plan', price: 370, features: ['12 vCore (AMD Epyc)', '24GB DDR5 RAM', '150GB NVMe SSD'] },
          { name: 'Proplus Plan', price: 470, features: ['16 vCore (AMD Epyc)', '32GB DDR5 RAM', '200GB NVMe SSD'] },
          { name: 'Unlimited Plan', price: 650, features: ['Unlimited vCore', '64GB DDR5 RAM', 'Unlimited NVMe', 'Free Subdomain'] },
          { name: 'Infinite Plan', price: 950, topTier: true, features: ['Unlimited vCore', 'Unlimited DDR5 RAM', 'Unlimited NVMe', 'Priority Support'] }
        ]
      },
      {
        id: 'vps', icon: 'cpu', title: 'VPS Hosting',
        heading: 'PREMIUM VPS PLANS', desc: 'Full root access. Dedicated resources. Global network.',
        items: [
          { name: 'Starter Plan', price: 139, features: ['1 vCore', '2 GB RAM', '50 GB Storage'] },
          { name: 'Basic Plan', price: 229, features: ['2 vCore', '4 GB RAM', '80 GB Storage'] },
          { name: 'Pro Plan', price: 289, popular: true, features: ['4 vCore', '8 GB RAM', '100 GB Storage'] },
          { name: 'Advanced Plan', price: 409, features: ['8 vCore', '16 GB RAM', '300 GB Storage'] },
          { name: 'Ultra Plan', price: 649, features: ['16 vCore', '32 GB RAM', '800 GB Storage'] },
          { name: 'God Tier Plan', price: 969, features: ['16 vCore', '64 GB RAM', '1 TB Storage'] }
        ]
      },
      {
        id: 'domains', icon: 'globe', title: 'Domain Plan',
        heading: 'Looking for a custom domain?', desc: 'We’ve got you covered! Perfect for Minecraft Servers, Studios, Businesses, and more.',
        items: [
           { name: '.com', price: 14 * 83 }, { name: '.net', price: 16 * 83 }, { name: '.org', price: 15 * 83 },
           { name: '.cloud', price: 5 * 83 }, { name: '.xyz', price: 4 * 83 }, { name: '.info', price: 10 * 83 },
           { name: '.co', price: 19 * 83 }, { name: '.bd', price: 16 * 83 }, { name: '.in', price: 10 * 83 },
           { name: '.pk', price: 18 * 83 }
        ],
        domainMode: true
      },
      {
        id: 'pterodactyl', icon: 'layout-dashboard', title: 'Pterodactyl Panel',
        heading: 'Pterodactyl Panel Setup', desc: 'Professional installation and configuration services.',
        items: [
          { name: 'PLAN 1', price: 50, oldPrice: 71, features: ['Pterodactyl Panel installation', 'Wings Setup'] },
          { name: 'PLAN 2', price: 70, oldPrice: 100, features: ['Pterodactyl Panel installation + Wings Setup', 'Theme (default Nebula/your theme)', 'Player manager (free)'] },
          { name: 'PLAN 3', price: 100, oldPrice: 143, pteroOffer: true, topTier: true, features: ['Pterodactyl Panel installation + Wings Setup', 'Theme (default Nebula/your theme)', 'Player manager (free)', '**Dashboard install**'] }
        ]
      },
      {
        id: 'discord', icon: 'message-square', title: 'Discord Setup',
        heading: 'Discord Developer Plan', desc: 'Get your community hub running flawlessly.',
        items: [
          { name: 'Ticket Setup', price: 70, oldPrice: 100, features: ['Advanced Ticket System', 'Transcripts & Logs'] },
          { name: 'Security Setup', price: 89, oldPrice: 127, features: ['Anti-Raid & Anti-Nuke', 'Verification Systems'] },
          { name: 'Role Setup', price: 39, oldPrice: 56, features: ['Role Hierarchy', 'Color & Aesthetics'] },
          { name: 'Permission Setup', price: 39, oldPrice: 56, features: ['Category Permissions', 'Private Channels'] },
          { name: 'Full Professional Setup', price: 129, oldPrice: 184, topTier: true, features: ['All Above Features', 'Server Theme Setup', 'Custom Bots Config'] }
        ]
      }
    ];

    let activeTab = 'minecraft';

    function setActiveTab(id) {
      activeTab = id;
      renderAll();
    }

    function renderAll() {
      const currency = document.getElementById('currencySelector').value;
      const rate = rates[currency] || 1;
      const symbol = symbols[currency] || '₹';

      function fm(price) {
        let val = price * rate;
        return symbol + (val % 1 !== 0 ? val.toFixed(2) : val);
      }

      // Render Tabs
      const tabsContainer = document.getElementById('tabs-container');
      tabsContainer.innerHTML = data.map(t => {
        const isActive = t.id === activeTab;
        const classes = isActive 
          ? 'active bg-primary text-slate-900 border-primary shadow-[0_0_10px_rgba(6,182,212,0.3)]' 
          : 'text-slate-400 hover:text-white border-transparent';
        return `<button onclick="setActiveTab('${t.id}')" class="tab-btn px-4 py-2 text-sm font-bold uppercase tracking-widest rounded border transition-colors flex items-center gap-2 ${classes}">
          <i data-lucide="${t.icon}" class="h-4 w-4"></i> ${t.title}
        </button>`;
      }).join('');

      // Render Active Pane
      const activeData = data.find(t => t.id === activeTab);
      const panesContainer = document.getElementById('panes-container');
      
      let html = `<div class="mb-8 max-w-2xl">
        <h2 class="text-2xl text-white font-semibold flex items-center gap-2 mb-2">
          <i data-lucide="${activeData.icon}" class="text-primary h-6 w-6"></i>
          <span>${activeData.heading}</span>
        </h2>
        <p class="text-slate-400 text-sm">${activeData.desc}</p>
      </div>`;

      if (activeData.domainMode) {
        html += `<div class="grid sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-4">`;
        activeData.items.forEach(item => {
          let oldPrice = Math.round(item.price / 0.7);
          html += `
            <div class="p-6 rounded-lg bg-dark-card border border-dark-border hover:border-primary flex flex-col justify-between transition-all group">
              <div class="flex flex-col">
                <h3 class="text-2xl font-bold text-white mb-2">${item.name}</h3>
                <div class="flex items-baseline gap-1 mb-6">
                  <span class="text-xs font-medium text-slate-500 line-through mr-1">${fm(oldPrice)}</span>
                  <span class="text-2xl font-light text-white">${fm(item.price)}</span>
                  <span class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">/ yr</span>
                </div>
                <div class="h-[1px] w-full bg-dark-border mb-6"></div>
                <ul class="flex flex-col gap-2 mb-6">
                  <li class="flex items-center gap-2"><i data-lucide="check" class="h-3 w-3 text-green-500"></i><span class="text-[11px] text-slate-300">1-Year Included</span></li>
                  <li class="flex items-center gap-2"><i data-lucide="check" class="h-3 w-3 text-green-500"></i><span class="text-[11px] text-slate-300">Full DNS Access</span></li>
                  <li class="flex items-center gap-2"><i data-lucide="check" class="h-3 w-3 text-green-500"></i><span class="text-[11px] text-slate-300">Instant Activation</span></li>
                </ul>
              </div>
              <a href="https://discord.gg/NrFzwAdPct" target="_blank" class="w-full py-2 px-4 rounded text-xs font-bold uppercase tracking-widest bg-dark-bg border border-dark-border hover:border-primary text-slate-300 hover:text-white transition-colors flex items-center justify-center gap-2 mt-auto">
                Select
              </a>
            </div>
          `;
        });
        html += `</div>`;
      } else {
        const colsClass = activeData.id === 'minecraft' || activeData.id === 'vps' 
          ? 'grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6'
          : 'grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6';

        html += `<div class="${colsClass}">`;
        activeData.items.forEach(item => {
          let oldPrice = item.oldPrice || Math.round(item.price / 0.7);
          let extraClass = (item.topTier || item.popular) ? "border-primary shadow-[0_0_15px_rgba(6,182,212,0.2)] hover:border-primary-light" : "border-dark-border hover:border-primary-dark";
          let badge = '';
          if (item.topTier) badge = `<div class="absolute top-0 right-0 bg-primary/20 text-primary-light text-[9px] font-bold uppercase tracking-widest px-3 py-1 border-b border-l border-primary/30">Top Tier</div>`;
          if (item.popular) badge = `<div class="absolute top-0 right-0 bg-primary/20 text-primary-light text-[9px] font-bold uppercase tracking-widest px-3 py-1 border-b border-l border-primary/30">Most Popular</div>`;
          
          let offerHtml = '';
          if (item.pteroOffer) offerHtml = `<div class="mt-4 p-3 bg-primary/10 border border-primary/30 rounded text-xs text-primary-light flex items-start gap-2"><i data-lucide="gift" class="h-4 w-4 shrink-0 mt-0.5"></i><span><strong class="text-white">Offer:</strong> Get ₹100 OFF on Billing Theme with this plan!</span></div>`;

          let features = item.features.map(f => `<li class="flex items-center gap-3"><i data-lucide="check-circle" class="h-4 w-4 text-primary shrink-0"></i><span class="text-sm text-slate-300">${f.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")}</span></li>`).join('');

          let btnClass = (item.topTier || item.popular) ? "bg-primary text-slate-900 hover:bg-primary-hover shadow-[0_0_10px_rgba(6,182,212,0.3)]" : "bg-transparent text-primary-light border border-primary hover:bg-primary/20";
          
          html += `
            <div class="p-6 rounded-lg bg-dark-card backdrop-blur-md border ${extraClass} flex flex-col justify-between transition-all duration-300 relative overflow-hidden group hover:-translate-y-1 hover:shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
              ${badge}
              <div class="flex flex-col">
                <h3 class="text-lg font-semibold text-white mb-2">${item.name}</h3>
                <div class="flex items-baseline gap-1 mb-6">
                  <span class="text-sm font-medium text-slate-500 line-through mr-1">${fm(oldPrice)}</span>
                  <span class="text-3xl font-light text-white">${fm(item.price)}</span>
                  <span class="text-xs text-slate-500 font-medium uppercase tracking-widest">/ mo</span>
                </div>
                <div class="h-[1px] w-full bg-dark-border mb-6 group-hover:bg-primary/30 transition-colors"></div>
                <ul class="flex flex-col gap-3 mb-4">
                  ${features}
                </ul>
                ${offerHtml}
              </div>
              <div class="flex flex-col gap-2 mt-8">
                <a href="https://discord.gg/NrFzwAdPct" target="_blank" class="w-full py-3 px-4 rounded text-xs font-bold uppercase tracking-widest transition-colors flex items-center justify-center gap-2 ${btnClass}">
                  Buy Now <i data-lucide="external-link" class="h-3 w-3"></i>
                </a>
              </div>
            </div>
          `;
        });
        html += `</div>`;
      }

      panesContainer.innerHTML = html;
      lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', renderAll);
  </script>
</body>
</html>
